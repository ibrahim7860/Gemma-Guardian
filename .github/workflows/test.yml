name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bridge:
    name: ws_bridge + shared contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r frontend/ws_bridge/requirements.txt
          pip install -r frontend/ws_bridge/requirements-dev.txt
          pip install -r shared/requirements.txt
      - name: Run shared contracts tests
        run: PYTHONPATH=. python -m pytest shared/ -v
      - name: Run ws_bridge tests
        run: PYTHONPATH=. python -m pytest frontend/ws_bridge/tests/ -m "not e2e" -v

  flutter:
    name: flutter_dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml for topic-constants generator
        run: pip install PyYAML
      - name: Generate topic constants (Python + Dart)
        run: PYTHONPATH=. python scripts/gen_topic_constants.py
      - name: Flutter pub get
        working-directory: frontend/flutter_dashboard
        run: flutter pub get
      - name: Flutter analyze
        working-directory: frontend/flutter_dashboard
        run: flutter analyze
      - name: Flutter test
        working-directory: frontend/flutter_dashboard
        run: flutter test

  bridge_e2e:
    name: bridge e2e (Playwright)
    runs-on: ubuntu-latest
    needs: [bridge, flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install redis-server
        run: sudo apt-get update && sudo apt-get install -y redis-server
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r frontend/ws_bridge/requirements.txt
          pip install -r frontend/ws_bridge/requirements-dev.txt
          pip install -r shared/requirements.txt
      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium
      - name: Generate topic constants
        run: PYTHONPATH=. python scripts/gen_topic_constants.py
      - name: Build Flutter web bundle
        working-directory: frontend/flutter_dashboard
        run: |
          flutter pub get
          flutter build web --release
      - name: Run bridge e2e Playwright tests
        run: PYTHONPATH=. python -m pytest frontend/ws_bridge/tests/test_e2e_playwright.py -m e2e -v
