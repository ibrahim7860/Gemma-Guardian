name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bridge:
    name: ws_bridge + shared contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync ws_bridge + dev extras (locked)
        run: uv sync --extra ws_bridge --extra dev --frozen
      - name: Run shared contracts tests
        run: PYTHONPATH=. uv run --no-sync python -m pytest shared/ -v
      - name: Run ws_bridge tests
        run: PYTHONPATH=. uv run --no-sync python -m pytest frontend/ws_bridge/tests/ -m "not e2e" -v

  sim_mesh:
    name: sim + mesh + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync sim + mesh + dev extras (locked)
        run: uv sync --extra sim --extra mesh --extra dev --frozen
      - name: Run sim + mesh + scripts tests
        run: PYTHONPATH=. uv run --no-sync python -m pytest sim/ agents/mesh_simulator/ scripts/tests/ -v

  flutter:
    name: flutter_dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync shared deps for topic-constants generator
        run: uv sync --frozen
      - name: Generate topic constants (Python + Dart)
        run: PYTHONPATH=. uv run --no-sync python scripts/gen_topic_constants.py
      - name: Flutter pub get
        working-directory: frontend/flutter_dashboard
        run: flutter pub get
      - name: Flutter analyze
        working-directory: frontend/flutter_dashboard
        run: flutter analyze
      - name: Flutter test
        working-directory: frontend/flutter_dashboard
        run: flutter test

  bridge_e2e:
    name: bridge e2e (Playwright)
    runs-on: ubuntu-latest
    needs: [bridge, flutter, sim_mesh]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install redis-server
        run: sudo apt-get update && sudo apt-get install -y redis-server
      - name: Sync ws_bridge + dev extras (locked)
        run: uv sync --extra ws_bridge --extra dev --frozen
      - name: Install Playwright chromium
        run: uv run --no-sync python -m playwright install --with-deps chromium
      - name: Generate topic constants
        run: PYTHONPATH=. uv run --no-sync python scripts/gen_topic_constants.py
      - name: Build Flutter web bundle
        working-directory: frontend/flutter_dashboard
        run: |
          flutter pub get
          flutter build web --release
      - name: Run bridge e2e Playwright tests
        run: PYTHONPATH=. uv run --no-sync python -m pytest frontend/ws_bridge/tests/test_e2e_playwright.py -m e2e -v
