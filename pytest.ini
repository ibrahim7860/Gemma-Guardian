[pytest]
markers =
    e2e: end-to-end tests that spawn real subprocesses (redis-server, uvicorn, http.server, chromium). Slow; excluded from quick runs via `-m "not e2e"`.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
; Hang safety net (eng-review 4A). Override per-test with
; @pytest.mark.timeout(N) for legitimate slow tests (e.g. Playwright cold-start).
timeout = 30
